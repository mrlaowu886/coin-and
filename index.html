<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BSC Wallet Connect</title>
  <style>
    :root {
      --bg: #0b1020;
      --bg-soft: #131b34;
      --panel: #172244;
      --text: #eaf0ff;
      --muted: #9fb2d4;
      --ok: #4cd97b;
      --warn: #f0b429;
      --line: #28417a;
      --btn: #2f6fed;
      --btn-hover: #275ed1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 700px at 20% 0%, #1d2f5e 0%, transparent 60%),
        radial-gradient(900px 500px at 100% 20%, #0f3b50 0%, transparent 55%),
        linear-gradient(180deg, var(--bg), #070a13);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(880px, 100%);
      background: linear-gradient(180deg, #16264d 0%, #111b36 100%);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.45);
      overflow: hidden;
    }

    .topbar {
      display: flex;
      justify-content: flex-end;
      padding: 10px 14px 0;
    }

    .lang-switch {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid rgba(88, 124, 196, 0.45);
      border-radius: 999px;
      background: rgba(10, 18, 36, 0.82);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.06),
        0 4px 12px rgba(0, 0, 0, 0.22);
      padding: 3px 6px;
    }

    .lang-select-label {
      color: var(--muted);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      white-space: nowrap;
      opacity: 0.9;
    }

    .lang-select {
      border: 1px solid rgba(70, 108, 180, 0.58);
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(24, 39, 76, 0.95), rgba(17, 29, 58, 0.95));
      color: var(--text);
      min-width: 144px;
      height: 28px;
      padding: 4px 24px 4px 10px;
      font-size: 11px;
      font-weight: 600;
      line-height: 1.1;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.07);
    }

    .lang-select:hover {
      border-color: rgba(98, 140, 224, 0.8);
    }

    .lang-select:focus {
      outline: none;
      border-color: #6da2ff;
      box-shadow:
        0 0 0 2px rgba(109, 162, 255, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    @media (max-width: 640px) {
      .lang-select-label {
        display: none;
      }

      .lang-select {
        min-width: 128px;
      }
    }

    .header {
      padding: 24px 24px 8px;
    }

    .title {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .content {
      padding: 20px 24px 24px;
      display: grid;
      gap: 16px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    button,
    select {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      background: var(--panel);
      color: var(--text);
      font-size: 14px;
    }

    button {
      cursor: pointer;
      background: var(--btn);
      border: none;
      transition: background-color 0.15s ease;
      font-weight: 600;
    }

    button:hover {
      background: var(--btn-hover);
    }

    button.secondary {
      background: #31487d;
    }

    button.secondary:hover {
      background: #2b3f6e;
    }

    button:disabled,
    select:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(16, 31, 66, 0.7);
      font-size: 13px;
      color: var(--muted);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #7788af;
    }

    .dot.ok {
      background: var(--ok);
    }

    .dot.warn {
      background: var(--warn);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: rgba(14, 24, 50, 0.75);
    }

    .label {
      margin: 0 0 6px;
      font-size: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .value {
      margin: 0;
      word-break: break-all;
      font-size: 15px;
      font-weight: 600;
    }

    .log {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      background: rgba(11, 18, 38, 0.8);
      color: #c9d7f8;
      font-family: Consolas, Menlo, Monaco, monospace;
      font-size: 12px;
      min-height: 56px;
      white-space: pre-wrap;
      line-height: 1.5;
    }

    .hint {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="card">
    <section class="topbar">
      <div id="langSwitch" class="lang-switch" aria-label="语言切换">
        <span id="langSelectLabel" class="lang-select-label">语言</span>
        <select id="langSelect" class="lang-select"></select>
      </div>
    </section>

    <section class="header">
      <h1 id="titleText" class="title">BSC 钱包连接</h1>
      <p id="subtitleText" class="subtitle">
        连接 EVM 钱包（MetaMask、Rabby、OKX、Bitget 等），当前仅开放 BSC 主网，其他公链已隐藏备用。
      </p>
    </section>

    <section class="content">
      <div class="row">
        <button id="connectBtn">连接钱包</button>
        <button id="refreshBtn" class="secondary">刷新</button>
        <button id="diagnoseBtn" class="secondary">诊断</button>
        <button id="copyBtn" class="secondary">复制地址</button>
        <button id="explorerBtn" class="secondary">打开浏览器</button>
        <button id="clearLogBtn" class="secondary">清空日志</button>
        <span id="walletStatus" class="status-pill"><span class="dot warn"></span>钱包未连接</span>
      </div>

      <div class="row">
        <select id="networkSelect"></select>
        <button id="switchBtn">切换到 BSC</button>
      </div>

      <div class="grid">
        <div class="panel">
          <p id="addressLabel" class="label">地址</p>
          <p id="addressValue" class="value">-</p>
        </div>
        <div class="panel">
          <p id="chainLabel" class="label">当前网络</p>
          <p id="chainValue" class="value">-</p>
        </div>
        <div class="panel">
          <p id="balanceLabel" class="label">原生代币余额</p>
          <p id="balanceValue" class="value">-</p>
        </div>
        <div class="panel">
          <p id="providerDebugLabel" class="label">钱包调试</p>
          <p id="providerDebugValue" class="value">-</p>
        </div>
      </div>

      <pre id="logBox" class="log">准备就绪。</pre>
      <p id="hintText" class="hint">提示：请勿通过 file:// 打开。请使用 localhost 或线上 HTTPS 域名。</p>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
